<h2>Servicios</h2>

<button (click)="mostrarFormulario()">Nuevo Servicio</button>

<div *ngIf="formVisible">

  <h3>{{ editando ? 'Editar Servicio' : 'Nuevo Servicio' }}</h3>

  <input type="text" placeholder="Nombre" [(ngModel)]="servicio.nombre">
  <input type="number" placeholder="Precio" [(ngModel)]="servicio.precio">
  <input type="number" placeholder="Duración (minutos)" [(ngModel)]="servicio.duracionMinutos">

  <button (click)="guardar()">Guardar</button>

</div>

<table border="1">

<tr>
  <th>ID</th>
  <th>Nombre</th>
  <th>Precio</th>
  <th>Duración</th>
  <th>Acciones</th>
</tr>

<tr *ngFor="let s of servicios">
  <td>{{s.id}}</td>
  <td>{{s.nombre}}</td>
  <td>{{s.precio}}</td>
  <td>{{s.duracionMinutos}} min</td>
  <td>
    <button (click)="editar(s)">Editar</button>
    <button (click)="eliminar(s.id)">Eliminar</button>
  </td>
</tr>

</table>
