<!-- 💰 VENTAS -->

<h3>💰 Ventas</h3>

<div style="display:flex; gap:20px">

  <div style="border:1px solid black; padding:15px">
    <h4>Hoy</h4>
    <p>{{ventas.ventasHoy}}</p>
  </div>

  <div style="border:1px solid black; padding:15px">
    <h4>Mes</h4>
    <p>{{ventas.ventasMes}}</p>
  </div>

  <div style="border:1px solid black; padding:15px">
    <h4>Total Mes</h4>
    <p>S/ {{ventas.totalMes}}</p>
  </div>

</div>
